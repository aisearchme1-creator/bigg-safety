      - name: Install fixed deps
        run: |
          sudo apt-get update
          sudo apt-get install -y build-essential git ccache autoconf automake libtool unzip openjdk-17-jdk \
            libsdl2-dev libsdl2-image-dev libsdl2-mixer-dev libsdl2-ttf-dev libportmidi-dev \
            libswscale-dev libavformat-dev libavcodec-dev zlib1g-dev libffi-dev libssl-dev \
            libncursesw5-dev libtinfo5 libclang-dev pkg-config cmake

      - name: Install Buildozer fixed
        run: |
          pip install --upgrade pip
          pip install cython==0.29.33 virtualenv buildozer==1.5.0

      - name: Clean & Build strict
        run: |
          buildozer android clean || true
          yes | buildozer -v android debug   # yes prompts skip करेगा
