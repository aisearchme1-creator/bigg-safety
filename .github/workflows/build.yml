name: Build BiggSafety APK

on:
  push:
    branches: [ main ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-22.04

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python 3.10
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'

      - name: Install dependencies
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y -qq build-essential git ccache autoconf automake libtool unzip openjdk-17-jdk \
            libsdl2-dev libsdl2-image-dev libsdl2-mixer-dev libsdl2-ttf-dev libportmidi-dev \
            libswscale-dev libavformat-dev libavcodec-dev zlib1g-dev libffi-dev libssl-dev

      - name: Install Buildozer with fixed Cython
        run: |
          pip install --upgrade pip
          pip install cython==0.29.33 virtualenv buildozer==1.5.0

      - name: Cache Buildozer
        uses: actions/cache@v4
        with:
          path: |
            ~/.buildozer
            .buildozer
          key: buildozer-${{ hashFiles('buildozer.spec') }}

      - name: Clean previous builds
        run: buildozer android clean || true

      - name: Build APK
        run: buildozer -v android debug

      - name: Debug Info - APK Search & Logs
        if: always()
        run: |
          echo "=== pwd ==="
          pwd
          echo "=== ls bin/ ==="
          ls -la bin/ 2>/dev/null || echo "bin/ नहीं बना"
          echo "=== Find all .apk ==="
          find . -name "*.apk" -exec ls -la {} \; 2>/dev/null || echo "कोई APK नहीं"
          echo "=== Last 50 lines of build log ==="
          tail -n 50 .buildozer/android/platform/build.log 2>/dev/null || echo "log नहीं मिला"

      - name: Upload APK
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: BiggSafety-APK
          path: |
            bin/*.apk
            .buildozer/android/platform/build/dists/*/bin/*.apk
          if-no-files-found: warn
          retention-days: 90
