name: Build APK

on:
  push:
    branches:
      - main
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-22.04

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.10'

      - name: Install dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            python3-pip build-essential git \
            libsdl2-dev libsdl2-image-dev \
            libsdl2-mixer-dev libsdl2-ttf-dev \
            libportmidi-dev libswscale-dev \
            libavformat-dev libavcodec-dev \
            zlib1g-dev libffi-dev libssl-dev \
            autoconf automake libtool unzip \
            openjdk-17-jdk

      - name: Install Buildozer
        run: |
          pip install --upgrade pip
          pip install buildozer cython virtualenv

      - name: Cache Buildozer
        uses: actions/cache@v4
        with:
          path: |
            ~/.buildozer
            ~/.android
          key: buildozer-${{ hashFiles('buildozer.spec') }}
          restore-keys: buildozer-

      - name: Build APK (with retry)
        run: |
          for i in 1 2 3; do
            echo "=== Build attempt $i ==="
            buildozer -v android debug && break
            echo "Attempt $i failed, retrying in 30s..."
            sleep 30
            buildozer android clean 2>/dev/null || true
          done

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: BiggSafety-APK
          path: bin/*.apk
          retention-days: 30
